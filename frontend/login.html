<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – FemBridge</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body style="background:linear-gradient(135deg,var(--pink-pastel) 0%,var(--white) 100%);min-height:100vh;display:flex;flex-direction:column;">

<nav class="navbar">
  <div class="container">
    <a class="navbar-brand" href="index.html">Fem<span>Bridge</span> 🌸</a>
    <a href="index.html" class="nav-link" style="color:var(--gray-700);">← Back to Home</a>
  </div>
</nav>

<div class="flex-grow-1 d-flex align-items-center justify-content-center py-5">
  <div class="form-wrapper fade-in" style="width:100%;max-width:440px;">
    <div style="text-align:center;margin-bottom:2rem;">
      <div style="font-size:2.8rem;margin-bottom:0.5rem;">🌸</div>
      <h2>Welcome Back</h2>
      <p style="color:var(--gray-500);font-size:0.92rem;">Sign in to continue your journey</p>
    </div>

    <form id="login-form" novalidate>
      <div class="form-group-custom">
        <label class="form-label-custom" for="login-email">Email Address</label>
        <input class="form-control-custom" type="email" id="login-email" placeholder="you@example.com" required />
      </div>
      <div class="form-group-custom">
        <label class="form-label-custom" for="login-password">Password</label>
        <input class="form-control-custom" type="password" id="login-password" placeholder="Your password" required />
      </div>
      <button type="submit" class="btn-primary-pink" style="width:100%;justify-content:center;padding:0.75rem;font-size:1rem;margin-top:0.5rem;">
        Sign In
      </button>
    </form>

    <p style="text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--gray-500);">
      Don't have an account? 
      <a href="register.html" style="color:var(--pink-deep);font-weight:600;">Register here</a>
    </p>
  </div>
</div>

<footer>
  <p>FemBridge © 2024 — Women's Career Portal</p>
</footer>

<script src="js/main.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
